<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIZIPLANETA — OS Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        #hero-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #0a1a0a 0%, #050505 100%); }
        .glow-text { text-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
        #main-app { display: none; height: 100vh; width: 100%; }
        .tab-item.active { background-color: #1a2e1a; border-radius: 10px; border-left: 4px solid #22c55e; }
        .chat-bg { background-color: #0e120e; background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); }
        
        #profile-modal, #image-viewer { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #profile-modal { background: rgba(0,0,0,0.85); }
        #image-viewer { background: rgba(0,0,0,0.95); flex-direction: column; }
        
        .animate-fade-in { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .delete-btn { opacity: 0; transition: all 0.2s; cursor: pointer; }
        .group:hover .delete-btn { opacity: 0.5; }
        .delete-btn:hover { opacity: 1 !important; color: #ef4444; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="image-viewer" onclick="closeImageViewer()">
        <div class="absolute top-0 w-full p-4 bg-black/50 flex justify-between items-center font-orbitron text-[10px] tracking-widest text-green-500">
            <span>TOXIZI_MEDIA_CORE</span>
            <button class="bg-green-600 text-white px-4 py-1 rounded-full hover:bg-green-500 transition">ЗАКРЫТЬ [ESC]</button>
        </div>
        <img id="full-res-image" src="" class="max-w-[90%] max-h-[80%] object-contain shadow-[0_0_50px_rgba(34,197,94,0.2)] border border-green-500/20" onclick="event.stopPropagation()">
    </div>

    <div id="profile-modal">
        <div class="bg-[#121a12] p-8 rounded-2xl border border-green-600/30 w-full max-w-md shadow-2xl animate-fade-in">
            <h2 class="font-orbitron text-xl mb-6 text-center text-green-500 uppercase">Настройки Toxizi-ID</h2>
            <div class="flex flex-col items-center gap-4 mb-6">
                <div class="relative group cursor-pointer" onclick="document.getElementById('avatar-input').click()">
                    <img id="modal-avatar" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=toxizi" class="w-24 h-24 rounded-full border-4 border-green-600 object-cover shadow-xl">
                    <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition text-[10px]">СМЕНИТЬ</div>
                </div>
            </div>
            <div class="space-y-4">
                <input type="text" id="edit-name" class="w-full bg-[#050505] border border-green-900/50 rounded-lg px-4 py-2 outline-none focus:border-green-600 transition" placeholder="Имя">
                <input type="text" id="edit-tag" class="w-full bg-[#050505] border border-green-900/50 rounded-lg px-4 py-2 outline-none focus:border-green-600 transition" placeholder="@tag">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeProfile()" class="flex-1 py-3 rounded-lg bg-gray-900 font-bold text-xs uppercase">Отмена</button>
                <button onclick="saveProfile()" class="flex-1 py-3 rounded-lg bg-green-600 font-bold text-xs uppercase">Сохранить</button>
            </div>
        </div>
    </div>

    <section id="hero-screen">
        <div class="mb-10 text-xl font-orbitron tracking-[10px] text-green-500 animate-pulse">☣️ TOXIZI ☣️</div>
        <h1 class="text-7xl font-black font-orbitron glow-text mb-4 uppercase tracking-tighter text-white">TOXIZIPLANETA</h1>
        <p class="text-gray-500 mb-8 font-bold uppercase text-[10px] tracking-[5px]">User Controlled Network v.3.2</p>
        <button onclick="openApp()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-12 rounded-full shadow-[0_0_30px_rgba(34,197,94,0.3)] transition-all hover:scale-105 active:scale-95 uppercase text-sm tracking-widest">
            Войти на Планету
        </button>
    </section>

    <div id="main-app" class="flex">
        <aside class="w-80 bg-[#0e120e] border-r border-green-900/20 flex flex-col p-2 z-10">
            <div onclick="openProfile()" class="p-3 mb-4 flex items-center gap-3 hover:bg-green-900/10 rounded-xl cursor-pointer transition border border-transparent hover:border-green-600/20">
                <img id="my-avatar" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=toxizi" class="w-12 h-12 rounded-full border-2 border-green-600 object-cover shadow-lg">
                <div class="overflow-hidden">
                    <div id="side-name" class="font-bold text-sm truncate uppercase text-white">TOXIZI_USER</div>
                    <div id="side-tag" class="text-green-500 text-[10px] font-bold truncate">@connect_v3</div>
                </div>
                <input type="file" id="avatar-input" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
            </div>

            <div class="flex-1 space-y-1">
                <div id="tab-chat" class="tab-item p-4 flex items-center gap-4 cursor-pointer active transition-all" onclick="showView('chat')">
                    <div class="w-12 h-12 bg-green-600 rounded-full flex items-center justify-center text-xl shadow-lg">👽</div>
                    <div>
                        <p class="font-bold text-sm">Общий чат</p>
                        <p class="text-[10px] text-green-400 font-bold uppercase italic">Real People Only</p>
                    </div>
                </div>
                
                <div id="tab-saved" class="tab-item p-4 flex items-center gap-4 cursor-pointer transition-all" onclick="showView('saved')">
                    <div class="w-12 h-12 bg-zinc-800 rounded-full flex items-center justify-center text-xl shadow-lg">🔋</div>
                    <div><p class="font-bold text-sm text-gray-300">Хранилище</p><p class="text-[10px] text-gray-500 font-bold uppercase">Личные данные</p></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col chat-bg relative">
            <div id="view-chat" class="flex-1 flex flex-col h-full">
                <div class="p-4 bg-black/40 backdrop-blur border-b border-green-900/20 text-[10px] font-bold font-orbitron tracking-[3px] text-green-500 flex justify-between items-center">
                    <span>TOXIZI_CORE // LIVE_MODE</span>
                    <span class="flex items-center gap-2"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> ONLINE</span>
                </div>
                <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
            </div>

            <div id="view-saved" class="hidden flex-1 flex flex-col h-full">
                <div class="p-4 bg-black/40 backdrop-blur border-b border-green-900/20 text-[10px] font-bold font-orbitron tracking-[3px] text-zinc-400">
                    PRIVATE_STORAGE
                </div>
                <div id="saved-messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
            </div>

            <div class="p-4 bg-[#0a0d0a] border-t border-green-900/20">
                <div class="max-w-4xl mx-auto flex gap-3 items-center bg-[#050505] rounded-2xl px-4 py-2 border border-green-600/10 shadow-2xl">
                    <label class="cursor-pointer hover:bg-green-600/10 p-2 rounded-full transition-all" title="Отправить фото">
                        <span class="text-xl opacity-70">📷</span>
                        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                    </label>
                    <input type="text" id="message-input" placeholder="Введите данные..." class="flex-1 bg-transparent outline-none text-white text-sm py-2">
                    <button onclick="handleSend()" class="bg-green-600 hover:bg-green-700 text-white font-bold text-[9px] uppercase px-6 py-2.5 rounded-xl transition-all shadow-lg active:scale-95">Передать</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentView = 'chat';
        let userData = {
            name: "Toxizi_User",
            tag: "@connect_v3",
            avatar: "https://api.dicebear.com/7.x/pixel-art/svg?seed=toxizi"
        };

        function openApp() {
            document.getElementById('hero-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            const container = document.getElementById('chat-messages');
            container.innerHTML = `<div class="text-center text-[8px] text-green-500/30 font-bold my-4 tracking-[6px] uppercase border-y border-green-500/5 py-2">СИСТЕМА ГОТОВА // USER: ${userData.name}</div>`;
        }

        function handleSend() {
            const input = document.getElementById('message-input');
            if(!input.value.trim()) return;
            addMessageToChat(input.value.trim(), 'text');
            input.value = "";
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => addMessageToChat(e.target.result, 'image');
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function deleteMessage(btn) {
            const messageWrapper = btn.closest('.message-item');
            const userName = userData.name;
            // Заменяем содержимое сообщения на уведомление об удалении
            messageWrapper.innerHTML = `
                <div class="w-full text-center py-2 animate-fade-in">
                    <span class="text-[7px] text-red-900 font-bold uppercase tracking-widest italic">
                        Данные стерты пользователем ${userName}
                    </span>
                </div>
            `;
            // Через 3 секунды можно совсем убрать уведомление, если нужно:
            // setTimeout(() => messageWrapper.remove(), 3000);
        }

        function addMessageToChat(content, type) {
            const containerId = currentView === 'chat' ? 'chat-messages' : 'saved-messages';
            const container = document.getElementById(containerId);
            const msgDiv = document.createElement('div');
            msgDiv.className = "message-item flex items-start gap-3 ml-auto flex-row-reverse mb-3 animate-fade-in group";
            
            const isSaved = currentView === 'saved';
            const bgColor = isSaved ? 'bg-zinc-900' : 'bg-green-950/40';
            const tagColor = isSaved ? 'text-green-500' : 'text-green-500';

            const bodyContent = type === 'text' 
                ? `<p class="text-sm text-white leading-relaxed break-words">${content}</p>` 
                : `<img src="${content}" onclick="openImageViewer(this.src)" class="max-w-[280px] rounded-xl border border-green-500/10 shadow-2xl cursor-pointer hover:scale-[1.02] transition-transform">`;

            msgDiv.innerHTML = `
                <img src="${userData.avatar}" class="w-8 h-8 rounded-full border border-green-600/30 object-cover shadow-lg">
                <div class="relative flex items-center gap-2">
                    <button onclick="deleteMessage(this)" class="delete-btn text-zinc-600 text-lg px-2" title="Удалить">×</button>
                    <div class="${bgColor} p-3 rounded-2xl rounded-tr-none shadow-xl border border-green-500/10 min-w-[100px]">
                        <p class="text-[9px] ${tagColor} font-black mb-1 uppercase italic">${userData.name} • ${userData.tag}</p>
                        ${bodyContent}
                        <div class="text-[6px] text-green-500/20 text-right mt-1 font-bold">DATA_SYNC_OK</div>
                    </div>
                </div>
            `;

            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function openImageViewer(src) {
            const viewer = document.getElementById('image-viewer');
            const fullImg = document.getElementById('full-res-image');
            fullImg.src = src;
            viewer.style.display = 'flex';
        }

        function closeImageViewer() { document.getElementById('image-viewer').style.display = 'none'; }

        window.addEventListener('keydown', (e) => { if(e.key === "Escape") closeImageViewer(); });

        function showView(view) {
            currentView = view;
            document.getElementById('view-chat').classList.toggle('hidden', view !== 'chat');
            document.getElementById('view-saved').classList.toggle('hidden', view !== 'saved');
            document.getElementById('tab-chat').classList.toggle('active', view === 'chat');
            document.getElementById('tab-saved').classList.toggle('active', view === 'saved');
            document.getElementById('message-input').placeholder = view === 'chat' ? "Передать в эфир..." : "Записать в память...";
        }

        function openProfile() {
            document.getElementById('profile-modal').style.display = 'flex';
            document.getElementById('edit-name').value = userData.name;
            document.getElementById('edit-tag').value = userData.tag;
            document.getElementById('modal-avatar').src = userData.avatar;
        }

        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }

        function saveProfile() {
            userData.name = document.getElementById('edit-name').value || "Toxizi_User";
            userData.tag = document.getElementById('edit-tag').value || "@planetary";
            userData.avatar = document.getElementById('modal-avatar').src;
            document.getElementById('side-name').innerText = userData.name.toUpperCase();
            document.getElementById('side-tag').innerText = userData.tag;
            document.getElementById('my-avatar').src = userData.avatar;
            closeProfile();
        }

        function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('modal-avatar').src = e.target.result;
            reader.readAsDataURL(file);
        }

        document.getElementById('message-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
